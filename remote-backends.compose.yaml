services:
  pve1-dummy:
    image: nginx:alpine
    env_file:
      - "setup/pve1.env"
    networks:
      - nginx-proxy
    labels:
    - "com.github.nginx-proxy.nginx.proxy=false"
    depends_on:
      - wol-api
  
  pve-core-dummy:
    image: nginx:alpine
    env_file:
      - "setup/pve-core.env"
    networks:
      - nginx-proxy
    labels:
    - "com.github.nginx-proxy.nginx.proxy=false"
  
  pve-super-dummy:
    image: nginx:alpine
    env_file:
      - "setup/pve-super.env"
    networks:
      - nginx-proxy
    labels:
    - "com.github.nginx-proxy.nginx.proxy=false"

  wol-api:
    build: ./api
    restart: unless-stopped
    networks:
      - nginx-proxy
    ports:
      - "5000:5000"