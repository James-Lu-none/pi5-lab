include:
  - ./monitoring.compose.yaml
  - ./telegraf.compose.yaml
  - ./remote-backends.compose.yaml

services:
    nginx-proxy:
        image: nginxproxy/nginx-proxy:alpine
        restart: "always"
        ports:
         - "80:80"
         - "443:443"
        networks:
         - nginx-proxy
        volumes:
         - ./setup/custom_502.html:/usr/share/nginx/html/custom_502.html:ro
         - ./setup/nginx-dummy.conf:/etc/nginx/conf.d/nginx-dummy.conf:ro
         - /var/run/docker.sock:/tmp/docker.sock:ro
         - "nginx-conf:/etc/nginx/conf.d"
         - "nginx-vhost:/etc/nginx/vhost.d"
         - "html:/usr/share/nginx/html"
         - "certs:/etc/nginx/certs"

    acme-companion:
        image: nginxproxy/acme-companion
        volumes:
         - "acme:/etc/acme.sh"
         - /var/run/docker.sock:/var/run/docker.sock:ro
         - "nginx-conf:/etc/nginx/conf.d"
         - "nginx-vhost:/etc/nginx/vhost.d"
         - "html:/usr/share/nginx/html"
         - "certs:/etc/nginx/certs"
        volumes_from:
         - nginx-proxy
        env_file: "setup/.env"
        depends_on:
            - nginx-proxy
        restart: always

networks:
    nginx-proxy:
volumes:
    nginx-conf:
    nginx-vhost:
    html:
    certs:
    acme: